# Publishes @synmux/claude-commit to the npm registry whenever a version tag
# (e.g. 0.1.3) is pushed.
#
# Authentication uses npm trusted publishing (OIDC) — no NPM_TOKEN secret.
# One-time setup on npmjs.com: package Settings → Trusted Publisher →
# GitHub Actions, with organisation `synmux`, repository `claude-commit`,
# workflow filename `publish.yml`, and the environment field left blank.

name: Publish to npm

permissions:
  contents: read
  id-token: write # mint the OIDC token npm exchanges for publish credentials

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
      - v[0-9]*.[0-9]*.[0-9]*

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Verify tag matches package.json version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(jq -r .version package.json)"
          if [ "${tag_version}" != "${package_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${package_version}" >&2
            exit 1
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      # Node 24 bundles npm >= 11.5.1, the minimum for OIDC trusted publishing.
      # Deliberately no `registry-url` here: it writes an .npmrc that expects a
      # NODE_AUTH_TOKEN env var, which breaks tokenless OIDC publishes.
      - name: Set up Node.js for npm publish
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Publish to npm
        run: npm publish --access public
